---

- name: Create Dockerfile
  template:
    src: 'Dockerfile.j2'
    dest: '${GITHUB_WORKSPACE}/Dockerfile'
    mode: 0755

- name: Build docker image
  shell: 'docker build -t 472771150659.dkr.ecr.ap-southeast-1.amazonaws.com/github:latest .'
  args:
    chdir: '${GITHUB_WORKSPACE}'

- name: Tag docker image
  shell: 'docker tag 472771150659.dkr.ecr.ap-southeast-1.amazonaws.com/github:latest 472771150659.dkr.ecr.ap-southeast-1.amazonaws.com/github:${SHORT_SHA}'
  args:
    chdir: '${GITHUB_WORKSPACE}'

- name: Push docker image
  shell: 'docker push 472771150659.dkr.ecr.ap-southeast-1.amazonaws.com/github:{{ item }}'
  args:
    chdir: '${GITHUB_WORKSPACE}'
  loop:
    - '${SHORT_SHA}'
    - latest
