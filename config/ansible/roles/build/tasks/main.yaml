---

- name: Create Dockerfile
  template:
    src: 'Dockerfile.j2'
    dest: '{{ workspace }}/Dockerfile'
    mode: 0755

- name: Composer install
  shell: 'composer install'
  args:
    chdir: '{{ workspace }}'

- name: Build docker image
  shell: 'docker build -t {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/github:latest .'
  args:
    chdir: '{{ workspace }}'

- name: Tag docker image
  shell: 'docker tag {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/github:latest {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/github:{{ version }}'
  args:
    chdir: '{{ workspace }}'

- name: Login to ECR
  shell: |
    aws ecr get-login-password --region {{ aws_region }} \
    | docker login \
        --username AWS \
        --password-stdin \
        {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com

- name: Push docker image
  shell: 'docker push {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/github:{{ item }}'
  args:
    chdir: '{{ workspace }}'
  loop:
    - '{{ version }}'
    - latest
